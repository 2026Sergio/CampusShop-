<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusShop | Carrito</title>
    <link rel="stylesheet" href="../CSS/base.css">
    <link rel="stylesheet" href="../CSS/layout.css">
    <link rel="stylesheet" href="../CSS/components.css">
    <link rel="stylesheet" href="../CSS/responsive.css">
</head>
<body>
    <input type="checkbox" id="btn-menu">

    <aside class="sidebar">
        <div class="sidebar-header">
            <img src="../IMG/LOGOS/icono1.png" alt="Logo" width="200px" class="logo-sidebar">
            <h2>CampusShop</h2>
            <label for="btn-menu" class="close-btn"></label>
        </div>
        <nav>
            <ul>
                <li><a href="../index.html">☰ HOME</a></li>
                <li><a href="../productos/abrigos.html">Abrigos</a></li>
                <li><a href="../productos/camisas.html">Camisetas</a></li>
                <li><a href="../productos/pantalones.html">Pantalones</a></li>
                <li><a href="../productos/zapatos.html">Zapatos</a></li>
                <hr>
                <li><a href="catalogo.html">Catálogo</a></li>
                <li><a href="perfil.html">Perfil</a></li>
                <li class="active"><a href="carrito.html">Carrito</a></li>
            </ul>
        </nav>
    </aside>
    <label for="btn-menu" class="overlay"></label>
    <div class="content-wrapper">
        <header>
            <label for="btn-menu" class="hamburguesa">☰ MENU</label>
            <h1>Mi Carrito</h1>
            <img src="../IMG/LOGOS/icono1.png" alt="Logo" width="200px" class="logo-header">
        </header>

        <main class="cart-container">
            <div class="cart-wrapper">
                <section class="cart-items">
                    <article class="cart-item">
                        <img src="../IMG/LOGOS/icono1.png" alt="Producto">
                        <div class="item-details">
                            <div class="item-info">
                                <h3>producto</h3>
                                <p class="ref">Ref: #SKU12345inventar</p>
                            </div>
                            <div class="item-controls">
                                <div class="qty">
                                    <button>-</button><span>1</span><button>+</button>
                                </div>
                                <div class="price-box">
                                    <p>Q.00.50</p>
                                    <span>subtotal</span>
                                </div>
                            </div>
                        </div>
                        <a href="vacio.html" class="link-clear">
                        <button class="btn-delete">🗑️</button>
                        </a>
                    </article>
                    </section>

                <aside class="cart-summary">
                    <h3>Resumen</h3>
                    <div class="summary-row">
                        <span>Subtotal</span>
                        <span>Q.00.50</span>
                    </div>
                    <div class="summary-row">
                        <span>Envío</span>
                        <span>Q.00.00</span>
                    </div>
                    <hr>
                    <div class="summary-row total">
                        <strong>Total</strong>
                        <strong>Q.225.50</strong>
                    </div>
                    <a href="verificar.html" class="link-clear">
                    <button class="btn-checkout">Proceder al Pago</button>
                    </a>
                </aside>
            </div>
        </main>
    </div>
</body>
</html>
