<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusShop | Checkout</title>
    <link rel="stylesheet" href="../CSS/base.css">
    <link rel="stylesheet" href="../CSS/layout.css">
    <link rel="stylesheet" href="../CSS/components.css">
    <link rel="stylesheet" href="../CSS/responsive.css">
</head>
<body>
    <input type="checkbox" id="btn-menu">

    <aside class="sidebar">
        <div class="sidebar-header">
            <img src="../IMG/LOGOS/icono1.png" alt="Logo" width="200px" class="logo-sidebar">
            <h2>CampusShop</h2>
            <label for="btn-menu" class="hamburguesa"></label>
        </div>
        <nav>
            <ul>
                <li><a href="../index.html">☰ HOME</a></li>
                <li><a href="../productos/abrigos.html">Abrigos</a></li>
                <li><a href="../productos/camisa.html">Camisetas</a></li>
                <li><a href="../productos/pantalon.html">Pantalones</a></li>
                <hr>
                <li><a href="perfil.html">Perfil</a></li>
                <li class="active"><a href="carrito.html">Carrito</a></li>
            </ul>
        </nav>
    </aside>
    <label for="btn-menu" class="overlay"></label>
    <div class="content-wrapper">
        <header>
            <label for="btn-menu" class="hamburguesa">☰ MENU</label>
            <h1>Finalizar Compra</h1>
            <img src="../IMG/LOGOS/icono1.png" alt="Logo" width="200px" class="logo-header">
        </header>

        <main class="checkout-container">
            <div class="checkout-wrapper">
                <section class="checkout-forms">
                    
                    <fieldset class="form-section">
                        <legend>Envío</legend>
                        <div class="input-group">
                            <label for="nombre">Nombre Completo</label>
                            <input type="text" id="nombre" placeholder="Nombre completo">
                        </div>
                        <div class="input-group">
                            <label for="direccion">Dirección</label>
                            <input type="text" id="direccion" placeholder="Dirección de entrega">
                        </div>
                    </fieldset>
                    <fieldset class="form-section">
                        <legend>Método de Pago</legend>
                        <div class="payment-methods">
                            <label class="payment-method">
                                <input type="radio" name="pago" value="visa" checked>
                                <span>Visa / Mastercard</span>
                            </label>
                            <label class="payment-method">
                                <input type="radio" name="pago" value="paypal">
                                <span> PayPal</span>
                            </label>
                        </div>
                    </fieldset>
                </section>

                <aside class="order-summary-box">
                    <h3>Resumen de tu Orden</h3>
                    <div class="summary-items">
                        <article class="summary-item">
                            <img src="../IMG/ROPA/CAMISAS/camisa1.jpg" alt="Producto">
                            <div class="item-info">
                                <h4>Zapatillas Deportivas</h4>
                                <p>Cantidad: 1</p>
                            </div>
                            <span class="item-price">Q.120.00</span>
                        </article>
                    </div>

                    <div class="summary-total">
                        <strong>Total</strong>
                        <strong>Q.120.00</strong>
                    </div>

                    <button class="btn-checkout">
                        <a href="simuladorestetica.html">
                            Pagar Ahora
                        </a>
                    </button>
                </aside>
            </div>
        </main>
    </div>
</body>
</html>
