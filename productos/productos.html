<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusShop | Detalle</title>
    <link rel="stylesheet" href="../../CSS/base.css">
    <link rel="stylesheet" href="../../CSS/layout.css">
    <link rel="stylesheet" href="../../CSS/components.css">
    <link rel="stylesheet" href="../../CSS/responsive.css">
</head>
<body>
    <input type="checkbox" id="btn-menu">

    <aside class="sidebar">
        <div class="sidebar-header">
            <img src="../../IMG/LOGOS/icono1.png" alt="Logo" class="logo-sidebar">
            <h2>CampusShop</h2>
            <label for="btn-menu" class="hamburguesa">☰HOME</label>
        </div>
        <nav>
            <ul>
                <li><a href="../../index.html">☰ HOME</a></li>
                <li><a href="abrigos.html">Abrigos</a></li>
                <li><a href="camisas.html">Camisetas</a></li>
                <li><a href="pantalon.html">Pantalones</a></li>
                <hr>
                <li><a href="../perfil.html">Perfil</a></li>
                <li><a href="../carrito.html">Carrito</a></li>
            </ul>
        </nav>
    </aside>

    <div class="content-wrapper">
        <header>
            <label for="btn-menu" class="hamburguesa">☰HOME</label>
            <h1>Detalle</h1>
            <img src="../../IMG/LOGOS/icono1.png" alt="Logo" class="logo-header">
        </header>

        <main class="product-detail-container">
            <section class="main-product-view">
                <div class="product-img-box">
                    <img src="../../IMG/ROPA/ABRIGOS/abrigo1.jpg" alt="Abrigo" class="main-img">
                </div>
                
                <div class="product-info-block">
                    <h1>Abrigo Classic</h1>
                    <p class="price">Q.175.00</p>
                    <p class="description">
                        Abrigo de alta calidad con acabados premium.
                    </p>

                    <div class="size-selector">
                        <p>Talla</p>
                        <div class="size-options">
                            <button class="size-btn">S</button>
                            <button class="size-btn active">M</button>
                            <button class="size-btn">L</button>
                        </div>
                    </div>
                    
                    <button class="btn-checkout">Agregar al carrito</button>
                </div>
            </section>

            <section class="related-products">
                <h3>Relacionados</h3>
                <div class="grid-container"> 
                    <article class="card">
                        <img src="../../IMG/ROPA/CAMISAS/camisa1.jpg" alt="Camisa">
                        <div class="card-info">
                            <h3>Camiseta Básica</h3>
                            <div class="price-row">
                                <p>Q.175.00</p>
                                <a href="#" class="btn-ver">Ver</a>
                            </div>
                        </div>
                    </article>
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 CampusShop - Sergio Ajú</p>
        </footer>
    </div>
</body>
</html>
