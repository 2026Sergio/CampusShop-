<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusShop | Abrigos</title>
    <link rel="stylesheet" href="../../CSS/base.css">
    <link rel="stylesheet" href="../../CSS/layout.css">
    <link rel="stylesheet" href="../../CSS/components.css">
    <link rel="stylesheet" href="../../CSS/responsive.css">
</head>
<body>
    <input type="checkbox" id="btn-menu">

    <aside class="sidebar">
        <div class="sidebar-header">
            <img src="../../IMG/LOGOS/icono1.png" alt="Logo CampusShop" width="200px" class="logo-sidebar">
            <h2>CampusShop</h2>
            <label for="btn-menu" class="close-btn">cerrar barra</label>
        </div>
        <nav>
            <ul>
                <li><a href="../../index.html">☰ HOME</a></li>
                <li class="active"><a href="abrigos.html">Abrigos</a></li>
                <li><a href="camisa.html">Camisetas</a></li>
                <li><a href="pantalon.html">Pantalones</a></li>
                <li><a href="zapatos.html">Zapatos</a></li>
                <hr>
                <li><a href="../archivos html/catalogo.html">Catálogo</a></li>
                <li><a href="../archivos html/perfil.html">Perfil</a></li>
                <li><a href="../archivos html/carrito.html">Carrito</a></li>
            </ul>
        </nav>
    </aside>

    <div class="content-wrapper">
        <header>
            <label for="btn-menu" class="hamburguesa">☰ MENU</label>
            <h1>Abrigos</h1>
            <img src="../../IMG/LOGOS/icono1.png" alt="Logo CampusShop" width="200px" class="logo-header">
        </header>

        <main>
            <h2 class="section-title">Nuestra colección de Abrigos</h2>
            
            <section class="grid-container">   
                
                <article class="card">
                    <span class="badge oferta">oferta</span>
                    <img src="../../IMG/ROPA/ABRIGOS/abrigo1.jpg" alt="Sudadera Clásica">
                    <div class="card-info">
                        <h3>Sudadera Clásica</h3>
                        <div class="price-row">
                            <p>Q.300.00</p>
                            <div class="actions">
                                <button class="btn-add">🛒</button>
                                <a href="productos.html" class="btn-ver">Ver</a>
                            </div>
                        </div>
                    </div>
                </article>

                <article class="card">
                    <span class="badge stock">stock</span>
                    <img src="../../IMG/ROPA/ABRIGOS/abrigo2.jpg" alt="Abrigo Beige">
                    <div class="card-info">
                        <h3>Abrigo Moderno</h3>
                        <div class="price-row">
                            <p>Q.375.00</p>
                            <div class="actions">
                                <button class="btn-add">🛒</button>
                                <a href="productos.html" class="btn-ver">Ver</a>
                            </div>
                        </div>
                    </div>
                </article>

            </section>
        </main>

        <footer>
            <p>&copy; 2026 CampusShop - Sergio Ajú</p>
        </footer>
    </div>
</body>
</html>
